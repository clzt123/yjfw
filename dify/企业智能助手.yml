    - data:
        classes:
        - id: '1'
          name: '意向客户录入

            核心场景：用户通过文字、语音方式，想要新增、录入、记录新的意向客户相关信息。

            用户典型话术：帮我录一个新客户、新增意向客户、记录一下这个客户信息、把这个客户资料存进去等。

            核心特征：动作围绕「新增、录入、保存全新意向客户数据」，无查询、更新、查看行为。'
        - id: '2'
          name: '意向客户查询

            核心场景：用户想要查看、调取、搜索已有意向客户的档案、资料、跟进记录、历史动态。

            用户典型话术：查一下这个客户的记录、看看之前的跟进情况、查询XX客户信息、调取客户档案等。

            核心特征：动作围绕「查看已有客户数据」，无新增、修改、更新客户状态行为。'
        - id: '1778658533586'
          name: '客户信息更新

            核心场景：用户想要修改、更新、变更已有意向客户的业务状态（已签约、已流失、跟进中、待洽谈等销售漏斗状态），同步业务进度。

            用户典型话术：把这个客户改成已签约、更新客户状态、这个客户流失了、修改客户跟进状态等。

            核心特征：动作围绕「修改存量客户的状态信息」，区别于录入新客户、查询客户信息。'
        - id: '1778658535721'
          name: '员工日报生成

            核心场景：员工口述/文字输入当日工作内容、工作进展、工作成果，需要AI自动整理、生成、录入个人当日工作日报。

            用户典型话术：帮我写今日日报、记录一下今天的工作、整理下我今天的工作进展、生成今日工作总结等。

            核心特征：个人主动提交、录入、生成自己的当日日报，区别于管理层查看团队日报。'
        - id: '1778658554250'
          name: '管理日报查阅

            核心场景：具备管理权限的用户，想要查看、汇总、查询团队、下属、全体成员的日报数据、工作进度、工作产出。

            用户典型话术：查看团队今日日报、汇总一下员工的工作日报、看看下属今天的工作情况、统计团队日报等。

            核心特征：查看他人/团队日报，非提交个人日报，为管理查询行为。'
        - id: '1778658555466'
          name: '公司部门与员工信息查询

            核心场景：用户想要查询公司部门信息、部门职能、员工联系方式、人员架构、岗位归属、同事信息等内部组织相关内容。

            用户典型话术：查一下公司组织架构、XX部门职责是什么、XX同事的联系方式、看看部门人员分布等。

            核心特征：查询企业内部组织、部门、人员、联系方式相关信息。'
        - id: '1778658609780'
          name: '公司信息查询

            核心场景：用户咨询入职流程、公司规章制度、员工规范、业务操作流程、新人融入相关问题，需要指引解答。

            用户典型话术：打印机在哪里、入职需要做什么、公司规章制度是什么、这个业务流程怎么走、新人怎么快速入职、员工规范咨询等。

            核心特征：围绕入职、制度、流程、职场规范的咨询与指引需求。'
        - id: '1778658611474'
          name: '学生业务综管

            核心场景：用户处理学生端全流程业务，包含学生成绩录入/查询、学生请假审批、学生投诉反馈、售后教务跟进等学生教务、售后相关工作。

            用户典型话术：查一下学生成绩、录入学生分数、审批学生请假、处理学生投诉、跟进学生反馈问题等。

            核心特征：所有学生、教务、学生售后、学生管理相关业务均归属此意图。'
        - id: '1778848570378'
          name: '日报汇总

            核心场景：对员工的日报进行汇总生成报告

            用户典型话术：生成员工日报汇总报告、生成今天的日报报告、生成这周的日报报告、生成2026年5月5日的日报报告、生成2026年5月5日到5月8日的日报报告'
