    - data:
        classes:
        - id: '1'
          name: '指令/描述： 学生需要请假、提交请假申请或询问请假流程。

            典型提问示例：

            “老师，我明天想请一天病假。”

            “请问学校的请假流程怎么走？”

            “家里有事，这周需要请假三天。”'
        - id: '2'
          name: '指令/描述： 学生表达心情不好、压力大、焦虑、迷茫，或寻求情绪上的安慰和聊天。

            典型提问示例：

            “最近学习压力好大，感觉快崩溃了。”

            “心情很差，想找人说说话。”

            “最近总是失眠，感觉很焦虑。”'
        - id: '1778656150066'
          name: '指令/描述： 学生对机构服务进行投诉、提出建议，或询问之前反馈问题的处理进度。

            典型提问示例：

            “我要投诉上次那个顾问，态度太差了。”

            “我之前提交的建议有人看吗？”

            “上次反映的宿舍问题怎么还没解决？”'
        - id: '1778656151576'
          name: '指令/描述： 学生查询考试时间、论文截止日期（DDL）、课程安排等教务相关信息/。

            典型提问示例：

            “我的毕业论文DDL是什么时候？”

            “下学期的期末考试时间表出来了吗？”

            “帮我查一下下周有哪些考试。”'
        - id: '1778656152245'
          name: '指令/描述： 学生询问留学申请、文书审核、签证办理等业务的当前办理进度。

            典型提问示例：

            “我的申请文书审核到哪一步了？”

            “签证办理现在是什么进度了？”

            “院校申请结果出来了吗？”'
        - id: '1778656153384'
          name: '指令/描述： 学生咨询海外生活常识，如当地医疗、交通出行、紧急求助、住宿生活等问题。

            典型提问示例：

            “在英国生病了去医院怎么预约？”

            “学校附近的交通卡怎么办理？”

            “如果遇到紧急情况应该打什么电话？”'
        - id: '1778656153889'
          name: '指令/描述： 学生主动咨询升学规划，如硕士、博士申请，或询问机构的其他学历提升项目。

            典型提问示例：

            “我想了解一下你们这边的硕士申请项目。”

            “本科毕业后如果想继续读博，有什么推荐吗？”

            “你们最近有什么新的学历提升课程吗？”'
