app:
  description: 能够精准识别前来咨询的客户的各种问题并做出精准的回答和引导下一步操作。
  icon: c4635044-9674-4b00-8cc8-c495939f3475
  icon_background: '#FFEAD5'
  icon_type: image
  mode: advanced-chat
  name: 粤教服务智能客服
  use_icon_as_answer_icon: false
