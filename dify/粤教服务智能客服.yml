  environment_variables: []
  features:
    file_upload:
      allowed_file_extensions:
      - .JPG
      - .JPEG
      - .PNG
      - .GIF
      - .WEBP
      - .SVG
      allowed_file_types:
      - image
      allowed_file_upload_methods:
      - remote_url
      - local_file
      enabled: false
      fileUploadConfig:
        attachment_image_file_size_limit: 2
        audio_file_size_limit: 50
        batch_count_limit: 5
        file_size_limit: 15
        file_upload_limit: 20
        image_file_batch_limit: 10
        image_file_size_limit: 10
        single_chunk_attachment_limit: 10
        video_file_size_limit: 100
        workflow_file_upload_limit: 10
      image:
        enabled: false
        number_limits: 3
        transfer_methods:
        - local_file
        - remote_url
      number_limits: 3
    opening_statement: '尊敬的客户，您好，想要咨询什么捏？

      想咨询公司信息相关请输示例：公司地址

      想咨询公司业务相关请输示例：公司有哪些业务

      想咨询留学政策相关请输示例：新加坡留学

      想咨询课程推荐相关请输示例：最近有什么课程推荐？

      想咨询活动报名请输示例：我想活动报名

      想自助了解常见问题请输示例：申请流程是？

      日常闲聊请输示例：你好'
